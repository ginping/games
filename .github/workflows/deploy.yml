name: Deploy To Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - lib/**
      - public/**
      - package.json
      - pnpm-lock.yaml
      - next.config.ts
      - open-next.config.ts
      - postcss.config.mjs
      - eslint.config.mjs
      - tsconfig.json
      - wrangler.jsonc
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Lint And Deploy
    runs-on: ubuntu-latest
    environment:
      name: main
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Deploy
        run: pnpm run deploy
